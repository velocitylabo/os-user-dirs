name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:
    inputs:
      full-matrix:
        description: "Run full OS/Node matrix"
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master' || inputs.full-matrix) && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
        node-version: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master' || inputs.full-matrix) && fromJSON('[20,22]') || fromJSON('[22]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm install
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: npm test
      - run: node test-esm.mjs
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
