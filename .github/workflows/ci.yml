name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
  workflow_call:
    inputs:
      full-matrix:
        description: "Run full OS/Node matrix"
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master' || inputs.full-matrix) && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
        node-version: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master' || inputs.full-matrix) && fromJSON('[20,22]') || fromJSON('[22]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm install
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: npm test
      - run: node test-esm.mjs
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  test-deno:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master' || inputs.full-matrix) && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run Deno compatibility tests
        run: deno run --allow-env --allow-read --allow-sys test-deno.ts

  test-bun:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master' || inputs.full-matrix) && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run Bun CJS compatibility tests
        run: bun run test-bun.js
      - name: Run Bun ESM compatibility tests
        run: bun run test-esm.mjs
